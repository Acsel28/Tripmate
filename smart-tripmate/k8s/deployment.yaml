apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: tripmate-api-gateway:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
        env:
        - name: AUTH_SERVICE_URL
          value: http://auth-service:5001
        - name: TRIP_SERVICE_URL
          value: http://trip-service:5003
        - name: PLANNING_SERVICE_URL
          value: http://planning-service:5004
        - name: BUDGET_SERVICE_URL
          value: http://budget-service:5007
        - name: NOTIFICATION_SERVICE_URL
          value: http://notification-service:5008
---
