- name: Deploy TripMate with Docker Compose
  hosts: tripmate
  gather_facts: false
  tasks:
    - name: Show Docker Compose version
      ansible.builtin.command:
        cmd: docker-compose --version
        chdir: "{{ playbook_dir }}/.."

    - name: Remove legacy TripMate app container if present
      ansible.builtin.command:
        cmd: docker rm -f tripmate-app
      ignore_errors: true

    - name: Remove compose-managed TripMate app container if present
      ansible.builtin.command:
        cmd: docker rm -f tripmate-tripmate-app-1
      ignore_errors: true

    - name: Remove Jenkins-workspace TripMate app container if present
      ansible.builtin.command:
        cmd: docker rm -f tripmate-pipeline-tripmate-app-1
      ignore_errors: true

    - name: Build and start TripMate services
      ansible.builtin.command:
        cmd: docker-compose -p tripmate up -d --build --force-recreate tripmate-app auth-service travel-service finance-service
        chdir: "{{ playbook_dir }}/.."
